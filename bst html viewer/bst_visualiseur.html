<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BST :: Visualiseur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0f;
    --panel:#15151c;
    --panel-2:#1c1c25;
    --line:#2a2a35;
    --text:#ece9e4;
    --muted:#8a8a96;
    --orange:#ff7a3d;
    --orange-dim:#7a4326;
    --teal:#5eead4;
    --red:#ff5d5d;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 1px) 0 0/24px 24px,
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  header{
    padding:22px 28px 14px 28px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:22px;
    margin:0;
    letter-spacing:0.5px;
  }
  header h1 .br{ color:var(--orange); }
  header p{
    margin:6px 0 0 0;
    color:var(--muted);
    font-size:13px;
  }
  .layout{
    flex:1;
    display:grid;
    grid-template-columns: 300px 1fr;
    gap:0;
    min-height:0;
  }
  @media (max-width: 820px){
    .layout{ grid-template-columns: 1fr; }
  }
  .panel{
    background:var(--panel);
    border-right:1px solid var(--line);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .field label{
    display:block;
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:inherit;
    font-size:15px;
    padding:10px 12px;
    border-radius:4px;
    outline:none;
  }
  .field input:focus{ border-color:var(--orange); }
  .actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  button{
    font-family:inherit;
    font-size:12px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:10px 8px;
    border-radius:4px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    cursor:pointer;
    transition:border-color 0.15s, color 0.15s, background 0.15s;
  }
  button:hover{ border-color:var(--orange); color:var(--orange); }
  button:active{ transform:translateY(1px); }
  button.primary{
    background:var(--orange);
    color:#1a0e06;
    border-color:var(--orange);
    font-weight:700;
  }
  button.primary:hover{ color:#1a0e06; opacity:0.9; }
  button.full{ grid-column: 1 / -1; }
  button.danger:hover{ border-color:var(--red); color:var(--red); }

  .console{
    flex:1;
    min-height:160px;
    background:#0e0e13;
    border:1px solid var(--line);
    border-radius:4px;
    padding:10px 12px;
    font-size:12.5px;
    line-height:1.6;
    overflow-y:auto;
    color:var(--muted);
  }
  .console .cmd{ color:var(--orange); }
  .console .ok{ color:var(--teal); }
  .console .ko{ color:var(--red); }
  .console-title{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:6px;
  }

  .stage{
    position:relative;
    overflow:auto;
    padding:24px;
  }
  .stage-empty{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:13px;
    text-align:center;
    pointer-events:none;
  }
  svg{ display:block; }
  .edge{
    stroke:var(--line);
    stroke-width:2;
    transition: x1 0.45s ease, y1 0.45s ease, x2 0.45s ease, y2 0.45s ease, opacity 0.3s;
  }
  .nodecircle{
    fill:var(--panel-2);
    stroke:var(--line);
    stroke-width:2;
    transition: cx 0.45s ease, cy 0.45s ease, fill 0.25s, stroke 0.25s, r 0.25s, opacity 0.3s;
  }
  .nodelabel{
    fill:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    font-weight:700;
    text-anchor:middle;
    dominant-baseline:central;
    pointer-events:none;
    transition: x 0.45s ease, y 0.45s ease, fill 0.25s, opacity 0.3s;
  }
  .nodecircle.visiting{ stroke:var(--orange); fill:var(--orange-dim); }
  .nodecircle.found{ stroke:var(--teal); fill:#0e3631; }
  .nodecircle.notfound{ stroke:var(--red); fill:#3a1414; }
  .nodecircle.newnode{ stroke:var(--teal); }
  .nodecircle.removing{ stroke:var(--red); fill:#3a1414; opacity:0.2; }
  .nodelabel.removing{ opacity:0.2; }

  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    font-size:11px;
    color:var(--muted);
    padding:0 28px 16px 28px;
    border-bottom:1px solid var(--line);
  }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; border:2px solid var(--line); background:var(--panel-2);}
  .dot.visiting{ border-color:var(--orange); background:var(--orange-dim); }
  .dot.found{ border-color:var(--teal); background:#0e3631; }
  .dot.notfound{ border-color:var(--red); background:#3a1414; }
</style>
</head>
<body>

<header>
  <h1><span class="br">[</span>BST<span class="br">]</span> Visualiseur — Arbre Binaire de Recherche</h1>
  <p>Simulation graphique du programme C : insertion, recherche, suppression, parcours par niveau (BFS).</p>
</header>

<div class="legend">
  <span><i class="dot"></i> nœud normal</span>
  <span><i class="dot visiting"></i> en cours de visite</span>
  <span><i class="dot found"></i> trouvé / inséré</span>
  <span><i class="dot notfound"></i> introuvable / supprimé</span>
</div>

<div class="layout">
  <div class="panel">
    <div class="field">
      <label for="val">Valeur</label>
      <input id="val" type="number" placeholder="ex: 42" inputmode="numeric">
    </div>

    <div class="actions">
      <button class="primary full" id="btn-insert">Insérer</button>
      <button id="btn-search">Rechercher</button>
      <button id="btn-delete" class="danger">Supprimer</button>
      <button class="full" id="btn-level">Afficher par niveau</button>
      <button id="btn-random">Aléatoire (8)</button>
      <button class="danger" id="btn-reset">Réinitialiser</button>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <div class="console-title">Console</div>
      <div class="console" id="console"></div>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="stage-empty" id="empty-msg">L'arbre est vide. Insérez une valeur pour commencer.</div>
    <svg id="tree-svg" width="100%" height="100%"></svg>
  </div>
</div>

<script>
/* ===================== Logique BST (miroir du code C) ===================== */
let nextId = 1;
function makeNode(value){
  return { id: nextId++, value, left: null, right: null, x:0, y:0 };
}

let root = null;

// insertion : meme regle que le C -> n.value < tmp.value -> gauche, sinon droite
function insertNode(node, value){
  if(node === null) return makeNode(value);
  let cur = node;
  while(true){
    if(value < cur.value){
      if(cur.left === null){ cur.left = makeNode(value); break; }
      cur = cur.left;
    } else {
      if(cur.right === null){ cur.right = makeNode(value); break; }
      cur = cur.right;
    }
  }
  return node;
}

// recherche : retourne le chemin parcouru (liste de noeuds) + le noeud trouvé ou null
function searchPath(node, value){
  const path = [];
  let cur = node;
  while(cur !== null){
    path.push(cur);
    if(value === cur.value) return { path, found: cur };
    cur = (value < cur.value) ? cur.left : cur.right;
  }
  return { path, found: null };
}

function minimum(node){
  let cur = node;
  while(cur.left !== null) cur = cur.left;
  return cur;
}

// suppression : memes 3 cas que le C
function deleteNode(node, value){
  if(node === null) return null;
  if(value === node.value){
    if(node.left === null && node.right === null){
      return null;
    } else if(node.left === null){
      return node.right;
    } else if(node.right === null){
      return node.left;
    } else {
      const succ = minimum(node.right);
      node.value = succ.value;
      node.right = deleteNode(node.right, succ.value);
      return node;
    }
  } else if(value < node.value){
    node.left = deleteNode(node.left, value);
    return node;
  } else {
    node.right = deleteNode(node.right, value);
    return node;
  }
}

// parcours par niveau (BFS), comme printByLevel
function levelOrder(node){
  const levels = [];
  if(node === null) return levels;
  let queue = [node];
  while(queue.length){
    const level = [];
    const next = [];
    for(const n of queue){
      level.push(n);
      if(n.left) next.push(n.left);
      if(n.right) next.push(n.right);
    }
    levels.push(level);
    queue = next;
  }
  return levels;
}

/* ===================== Layout (positions des noeuds) ===================== */
const R = 20;       // rayon des cercles
const HGAP = 56;    // espace horizontal entre feuilles
const VGAP = 78;    // espace vertical entre niveaux
const PAD = 40;

function layout(node){
  let counter = 0;
  let maxDepth = 0;
  function walk(n, depth){
    if(n === null) return;
    walk(n.left, depth+1);
    n.x = PAD + R + counter * HGAP;
    n.y = PAD + R + depth * VGAP;
    counter++;
    maxDepth = Math.max(maxDepth, depth);
    walk(n.right, depth+1);
  }
  walk(node, 0);
  const width = Math.max(counter * HGAP, 1) + PAD;
  const height = (maxDepth+1) * VGAP + PAD;
  return { width, height };
}

/* ===================== Rendu SVG ===================== */
const svg = document.getElementById('tree-svg');
const stage = document.getElementById('stage');
const emptyMsg = document.getElementById('empty-msg');

function render(){
  if(root === null){
    svg.innerHTML = '';
    emptyMsg.style.display = 'flex';
    return;
  }
  emptyMsg.style.display = 'none';
  const { width, height } = layout(root);
  svg.setAttribute('viewBox', `0 0 ${Math.max(width, stage.clientWidth - 4)} ${Math.max(height, stage.clientHeight - 4)}`);
  svg.setAttribute('width', Math.max(width, stage.clientWidth - 4));
  svg.setAttribute('height', Math.max(height, stage.clientHeight - 4));

  const edges = [];
  const nodes = [];
  function collect(n){
    if(n === null) return;
    if(n.left){ edges.push([n, n.left]); collect(n.left); }
    if(n.right){ edges.push([n, n.right]); collect(n.right); }
    nodes.push(n);
  }
  collect(root);

  let html = '';
  for(const [a,b] of edges){
    html += `<line class="edge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"></line>`;
  }
  for(const n of nodes){
    html += `<circle class="nodecircle" id="circ-${n.id}" cx="${n.x}" cy="${n.y}" r="${R}"></circle>`;
    html += `<text class="nodelabel" id="lbl-${n.id}" x="${n.x}" y="${n.y}">${n.value}</text>`;
  }
  svg.innerHTML = html;
}

/* ===================== Console / log ===================== */
const consoleEl = document.getElementById('console');
function log(msg, type){
  const line = document.createElement('div');
  if(type === 'cmd') line.innerHTML = `&gt; <span class="cmd">${msg}</span>`;
  else if(type === 'ok') line.innerHTML = `<span class="ok">${msg}</span>`;
  else if(type === 'ko') line.innerHTML = `<span class="ko">${msg}</span>`;
  else line.textContent = msg;
  consoleEl.appendChild(line);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

/* ===================== Helpers d'animation ===================== */
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

function clearHighlights(){
  document.querySelectorAll('.nodecircle').forEach(el => {
    el.classList.remove('visiting','found','notfound','newnode','removing');
  });
}

async function highlightPath(path, lastClass){
  for(let i = 0; i < path.length; i++){
    const el = document.getElementById('circ-' + path[i].id);
    if(!el) continue;
    if(i === path.length - 1 && lastClass){
      el.classList.add(lastClass);
    } else {
      el.classList.add('visiting');
    }
    await sleep(380);
  }
}

/* ===================== Actions UI ===================== */
const valInput = document.getElementById('val');

function getValue(){
  const v = valInput.value.trim();
  if(v === '' || isNaN(Number(v))){
    log('Valeur invalide.', 'ko');
    return null;
  }
  return parseInt(v, 10);
}

document.getElementById('btn-insert').addEventListener('click', async () => {
  const v = getValue();
  if(v === null) return;
  log(`insérer ${v}`, 'cmd');
  clearHighlights();
  render();

  // si l'arbre n'est pas vide, on simule la descente pour trouver la place
  if(root !== null){
    const { path } = searchPath(root, v);
    await highlightPath(path);
  }
  root = insertNode(root, v);
  render();
  // trouver le nouveau noeud et le mettre en valeur
  const { found } = searchPath(root, v);
  if(found){
    const el = document.getElementById('circ-' + found.id);
    if(el) el.classList.add('newnode');
  }
  log(`${v} inséré.`, 'ok');
  valInput.value = '';
  valInput.focus();
});

document.getElementById('btn-search').addEventListener('click', async () => {
  const v = getValue();
  if(v === null) return;
  log(`rechercher ${v}`, 'cmd');
  clearHighlights();
  if(root === null){ log("L'arbre est vide.", 'ko'); return; }
  const { path, found } = searchPath(root, v);
  await highlightPath(path, found ? 'found' : 'notfound');
  if(found) log(`Valeur trouvée : ${v}`, 'ok');
  else log(`Valeur ${v} non trouvée dans l'arbre.`, 'ko');
});

document.getElementById('btn-delete').addEventListener('click', async () => {
  const v = getValue();
  if(v === null) return;
  log(`supprimer ${v}`, 'cmd');
  clearHighlights();
  if(root === null){ log("L'arbre est vide.", 'ko'); return; }
  const { path, found } = searchPath(root, v);
  await highlightPath(path, found ? 'notfound' : 'notfound');
  if(!found){
    log(`Valeur ${v} non trouvée, rien à supprimer.`, 'ko');
    clearHighlights();
    return;
  }
  await sleep(300);
  root = deleteNode(root, v);
  render();
  log(`${v} supprimé.`, 'ok');
});

document.getElementById('btn-level').addEventListener('click', async () => {
  log('afficher par niveau', 'cmd');
  clearHighlights();
  if(root === null){ log("L'arbre est vide.", 'ko'); return; }
  const levels = levelOrder(root);
  let out = '';
  for(const level of levels){
    const vals = [];
    for(const n of level){
      const el = document.getElementById('circ-' + n.id);
      if(el) el.classList.add('visiting');
      vals.push(n.value);
      await sleep(180);
    }
    out += vals.join(' ') + '\n';
    log(vals.join(' '), 'ok');
    await sleep(120);
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  root = null;
  nextId = 1;
  clearHighlights();
  render();
  log('arbre réinitialisé', 'cmd');
});

document.getElementById('btn-random').addEventListener('click', async () => {
  log('génération aléatoire', 'cmd');
  for(let i = 0; i < 8; i++){
    const v = Math.floor(Math.random() * 99) + 1;
    root = insertNode(root, v);
    render();
    await sleep(150);
  }
  log('8 valeurs insérées.', 'ok');
});

valInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('btn-insert').click();
});

window.addEventListener('resize', render);

/* état initial */
render();
log("Prêt. Entrez une valeur puis choisissez une opération.", 'ok');
</script>

</body>
</html>
